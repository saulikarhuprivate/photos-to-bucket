steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'sync-photos'            # Funktion nimi GCP:ssä
      - '--gen2'                 # Suositellaan 2. sukupolven Cloud Functionsia
      - '--region=$_REGION'
      - '--source=.'
      - '--entry-point=sync_photos'
      - '--runtime=python313'    # Vaihdettu Python 3.13 -versioon
      - '--trigger-http'         # Koska funktiosi ottaa vastaan 'request'-parametrin
      - '--timeout=540s'         # Maksimiaika, jotta isot albumit ehtivät latautua
      - '--memory=512MB'         # Riittävästi muistia kuvien käsittelyyn ja välimuistiin
      
      # Ympäristömuuttujat välitetään Cloud Build -triggerin substituutioista:
      - '--set-env-vars=ALBUM_ID=$_ALBUM_ID,BUCKET_NAME=$_BUCKET_NAME,CLIENT_ID=$_CLIENT_ID,CLIENT_SECRET=$_CLIENT_SECRET,REFRESH_TOKEN=$_REFRESH_TOKEN'
      
      # HUOM! Tuotannossa Secret Managerin käyttö on tietoturvallisempaa. 
      # Jos konfiguroit salaisuudet Secret Manageriin, voit käyttää --set-secrets-lippua näin:
      # - '--set-secrets=REFRESH_TOKEN=projects/$PROJECT_ID/secrets/REFRESH_TOKEN_NAME:latest,CLIENT_SECRET=projects/$PROJECT_ID/secrets/CLIENT_SECRET_NAME:latest'

substitutions:
  _REGION: 'europe-north1' # Oletusalue (esim. Suomi/Hamina)
  
  # HUOM: Seuraavat arvot on suositeltavaa jättää tyhjiksi tässä tiedostossa
  # ja määrittää ne suoraan Google Cloud Build -triggerin "Substitution variables" -osiossa.
  # _ALBUM_ID: ''
  # _BUCKET_NAME: ''
  # _CLIENT_ID: ''
  # _CLIENT_SECRET: ''
  # _REFRESH_TOKEN: ''

options:
  logging: CLOUD_LOGGING_ONLY
